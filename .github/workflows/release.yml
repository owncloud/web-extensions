name: Release

on:
  push:
    tags:
      - '*-v*'

jobs:
  build:
    name: Build
    runs-on: ubuntu-latest
    outputs:
      app: ${{ steps.release-info.outputs.app }}
      version: ${{ steps.release-info.outputs.version }}
    steps:
      - name: Checkout code
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Parse release info
        id: release-info
        run: |
          TAG="${GITHUB_REF#refs/tags/}"
          APP="${TAG%-v*}"
          VERSION="${TAG#${APP}-v}"
          echo "app=${APP}" >> "$GITHUB_OUTPUT"
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"

      - name: Setup pnpm
        uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271 # v6.0.9
        with:
          version: 10.27.0

      - name: Setup Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 24.15.0
          cache: pnpm

      - name: Install dependencies
        run: pnpm install

      - name: Build app
        run: pnpm --filter ./packages/web-app-${{ steps.release-info.outputs.app }} build

      - name: Upload built app
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: app-${{ steps.release-info.outputs.app }}
          path: ./packages/web-app-${{ steps.release-info.outputs.app }}/dist

  github-release:
    name: Publish GitHub Release
    runs-on: ubuntu-latest
    needs: build
    permissions:
      contents: write
    steps:
      - name: Download built app
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: app-${{ needs.build.outputs.app }}
          path: ./packages/web-app-${{ needs.build.outputs.app }}/dist

      - name: Package app
        run: |
          APP=${{ needs.build.outputs.app }}
          VERSION=${{ needs.build.outputs.version }}
          cp -r packages/web-app-${APP}/dist ${APP}
          zip -r ${APP}-${VERSION}.zip ${APP}/
          md5sum ${APP}-${VERSION}.zip > md5sum.txt
          sha256sum ${APP}-${VERSION}.zip > sha256sum.txt

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@718ea10b132b3b2eba29c1007bb80653f286566b # v3.0.1
        with:
          name: ${{ needs.build.outputs.app }} ${{ needs.build.outputs.version }}
          body: |
            ${{ needs.build.outputs.app }}-${{ needs.build.outputs.version }}

            ## How to use
            Download the attached release artifact "${{ needs.build.outputs.app }}-${{ needs.build.outputs.version }}.zip" and extract it to your oCIS apps folder.
            Please refer to [our documentation](https://owncloud.dev/services/web/#loading-applications) for more information.
          files: |
            ./${{ needs.build.outputs.app }}-${{ needs.build.outputs.version }}.zip
            ./md5sum.txt
            ./sha256sum.txt

  docker-release:
    name: Publish Docker Image
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Checkout code
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Download built app
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: app-${{ needs.build.outputs.app }}
          path: ./packages/web-app-${{ needs.build.outputs.app }}/dist

      - name: Login to Docker Hub
        uses: docker/login-action@af1e73f918a031802d376d3c8bbc3fe56130a9b0 # v4.4.0
        with:
          username: ${{ vars.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Docker metadata
        id: meta
        uses: docker/metadata-action@dc802804100637a589fabce1cb79ff13a1411302 # v6.2.0
        with:
          images: owncloud/web-extensions

      - name: Build and push Docker image
        uses: docker/build-push-action@53b7df96c91f9c12dcc8a07bcb9ccacbed38856a # v7.3.0
        with:
          context: .
          file: docker/Dockerfile
          push: true
          tags: |
            owncloud/web-extensions:${{ needs.build.outputs.app }}-${{ needs.build.outputs.version }}
            owncloud/web-extensions:${{ needs.build.outputs.app }}-latest
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            app_path=./packages/web-app-${{ needs.build.outputs.app }}/dist
            app_name=${{ needs.build.outputs.app }}
